<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page page-center">
    <div class="card" style="width: 100%;">
      <h1>Reset Password</h1>
      <p class="subtitle">We'll send a code to your registered phone number.</p>

      <form id="request-form">
        <label for="staff_id">Staff ID</label>
        <input type="text" id="staff_id" name="staff_id" autocomplete="username" required />

        <p id="request-error" class="error-message" hidden></p>

        <button type="submit" class="btn btn-primary btn-large">Send Reset Code</button>
      </form>

      <form id="reset-form" hidden>
        <p id="request-success" class="subtitle"></p>

        <label for="otp_code">Reset code</label>
        <input type="text" id="otp_code" name="otp_code" inputmode="numeric" autocomplete="one-time-code" required />

        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" autocomplete="new-password" minlength="6" required />

        <p id="reset-error" class="error-message" hidden></p>
        <p id="reset-success" class="subtitle" hidden></p>

        <button type="submit" class="btn btn-primary btn-large">Reset Password</button>
      </form>

      <p style="margin-top: 16px;"><a href="login.html" class="btn btn-link">Back to login</a></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/forgot-password.js"></script>
</body>
</html>
